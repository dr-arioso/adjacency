exclude: '^examples/'

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (venv)
        entry: bash -c 'RUFF_CACHE_DIR=/tmp/ruff-adjacency .venv/bin/ruff "$@"' --
        language: system
        args: ["check", "--select", "E,F,W,C90", "--ignore", "E501,C901"]
        types_or: [python, pyi]
      - id: black
        name: black (venv)
        entry: .venv/bin/python tools/black_check.py
        language: system
        types_or: [python, pyi]
      - id: isort
        name: isort (venv)
        entry: .venv/bin/isort
        language: system
        args: ["--profile", "black"]
        types_or: [python, pyi]
      - id: mypy
        name: mypy (venv)
        entry: bash -c 'MYPYPATH=../turnturnturn/src MYPY_CACHE_DIR=/tmp/mypy-adjacency .venv/bin/mypy --strict'
        language: system
        pass_filenames: false
      - id: interrogate
        name: interrogate (docstring coverage)
        entry: .venv/bin/interrogate
        language: system
        pass_filenames: false
        args: ["src/adjacency", "--fail-under=80", "--ignore-init-method",
               "--ignore-init-module", "--ignore-magic"]
      - id: remove-zone-identifiers
        name: Remove WSL Zone.Identifier files
        entry: bash -c 'find . -name "*Zone.Identifier" -not -path "./.git/*" -print -delete'
        language: system
        pass_filenames: false
        always_run: true
      - id: remove-markdown-backups
        name: Remove Markdown backup files
        entry: bash -c 'find . \( -name "*.md.bak" -o -name "*.md~" -o -name "*.md.orig" \) -not -path "./.git/*" -print -delete'
        language: system
        pass_filenames: false
        always_run: true
      - id: check-added-large-files
        name: Check added large files
        entry: bash -c 'limit=524288; status=0; for file in "$@"; do if [ -f "$file" ]; then size=$(wc -c <"$file"); if [ "$size" -gt "$limit" ]; then echo "$file (${size} bytes) exceeds ${limit}-byte limit"; status=1; fi; fi; done; exit "$status"' --
        language: system
        pass_filenames: true
        stages: [pre-commit]
