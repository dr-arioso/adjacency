exclude: '^examples/'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4  # (or current)
    hooks:
      - id: ruff
        args: ["--select", "E,F,W,C90", "--ignore", "E501"]
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3.12
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]
  - repo: local
    hooks:
      - id: mypy
        name: mypy (venv)
        entry: .venv/bin/mypy
        language: system
        pass_filenames: false
        args: ["--strict", "src/adjacency"]
      - id: interrogate
        name: interrogate (docstring coverage)
        entry: .venv/bin/interrogate
        language: system
        pass_filenames: false
        args: ["src/adjacency", "--fail-under=80", "--ignore-init-method",
               "--ignore-init-module", "--ignore-magic"]
      - id: remove-zone-identifiers
        name: Remove WSL Zone.Identifier files
        entry: bash -c 'find . -name "*Zone.Identifier" -not -path "./.git/*" -print -delete'
        language: system
        pass_filenames: false
        always_run: true
      - id: remove-markdown-backups
        name: Remove Markdown backup files
        entry: bash -c 'find . \( -name "*.md.bak" -o -name "*.md~" -o -name "*.md.orig" \) -not -path "./.git/*" -print -delete'
        language: system
        pass_filenames: false
        always_run: true
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
